<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Network Meter Settings</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <div class="wrap">
      <h1>Settings</h1>

      <div class="card">
        <div class="row">
          <div class="label">Manual duration (seconds)</div>
          <input id="testSeconds" type="number" min="3" max="30" placeholder="10">
        </div>

        <div class="sep"></div>

        <div class="row">
          <div class="label">Auto interval (seconds)</div>
          <input id="autoIntervalSec" type="number" min="3" max="60" placeholder="10">
        </div>
        <div class="row">
          <div class="label">Auto test duration (seconds)</div>
          <input id="autoSeconds" type="number" min="2" max="10" placeholder="3">
        </div>

        <div class="sep"></div>

        <div class="row">
          <div class="label">Cloudflare download bytes per request</div>
          <input id="cfDownBytes" type="number" min="250000" max="20000000" placeholder="5000000">
        </div>
        <div class="row">
          <div class="label">Cloudflare upload bytes per request</div>
          <input id="cfUpBytes" type="number" min="100000" max="10000000" placeholder="2000000">
        </div>
      </div>

      <div class="actions">
        <button id="save">Save</button>
        <div id="status"></div>
      </div>

      <div class="sep"></div>

      <div class="card" id="devCard">
        <h2>Developer</h2>
        <div class="devLine"><span class="devK">Name</span><span class="devV">AZHAR</span></div>
        <div class="devLine"><span class="devK">Email</span><span class="devV">azhardev@outlook.com</span></div>
        <div class="devLine"><span class="devK">Website</span><a class="devV link" href="https://www.icecampus.in" target="_blank">icecampus.in</a></div>
      </div>
    </div>

    <script src="options.js"></script>
  </body>
</html>
